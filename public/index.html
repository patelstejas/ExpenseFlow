<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExpenseFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>ExpenseFlow</h1>
    <div id="total-banner">
      <span class="total-label">Total Spent</span>
      <span id="grand-total">$0.00</span>
    </div>
  </header>

  <main>
    <section class="card" id="add-section">
      <h2>Add Expense</h2>
      <form id="expense-form">
        <div class="form-row full-width">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="e.g. Grocery run" required>
        </div>
        <div class="form-row">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" min="0.01" step="0.01" placeholder="0.00" required>
        </div>
        <div class="form-row">
          <label for="category">Category</label>
          <select id="category">
            <option value="Food">Food</option>
            <option value="Rent">Rent</option>
            <option value="Fun">Fun</option>
            <option value="Transport">Transport</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-row full-width">
          <label for="date">Date</label>
          <input type="date" id="date" required>
        </div>
        <button type="submit" class="full-width">Add Expense</button>
        <p id="form-error" class="error-msg full-width" hidden></p>
      </form>
    </section>

    <section id="list-section">
      <div class="list-header">
        <h2>Expenses</h2>
        <div class="filters">
          <button class="filter-btn active" data-category="All">All</button>
          <button class="filter-btn" data-category="Food">Food</button>
          <button class="filter-btn" data-category="Rent">Rent</button>
          <button class="filter-btn" data-category="Fun">Fun</button>
          <button class="filter-btn" data-category="Transport">Transport</button>
          <button class="filter-btn" data-category="Other">Other</button>
        </div>
      </div>
      <div id="category-totals"></div>
      <div id="expense-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
